name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-package:
    name: Build & Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync vendor webview assets
        run: npm run vendor:sync

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --coverage

      - name: Compile
        run: npm run compile

      # Package id stays `fahh` (Marketplace downloads). Display name is FaultLine.
      - name: Package extension
        run: |
          set -euo pipefail
          npx @vscode/vsce package
          # Friendly alias for humans; Marketplace publish uses the fahh-*.vsix identity.
          cp fahh-*.vsix faultline.vsix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            fahh-*.vsix
            faultline.vsix
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
